  </filter>
  <style>
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
  .text{fill:#e6edf3} .soft{fill:#c9d1d9} .muted{fill:#8b949e}
  .blue{fill:#58a6ff} .green{fill:#3fb950} .purple{fill:#bc8cff} .orange{fill:#d29922} .red{fill:#f85149}
  .panel{fill:#0d1117;stroke:#30363d;stroke-width:1.6}
  .panel2{fill:#161b22;stroke:#30363d;stroke-width:1.4}
</style>

</defs>
