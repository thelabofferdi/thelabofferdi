  </defs>
  <rect width="1600" height="300" rx="34" fill="url(#bg)"/>
  <rect x="44" y="38" width="1512" height="224" rx="28" fill="#050A08" fill-opacity="0.72" stroke="#22E6A4" stroke-opacity="0.22"/>
