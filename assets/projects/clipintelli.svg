<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" fill="none" role="img" aria-labelledby="title desc">
<title id="title">ClipIntelli</title>
<desc id="desc">Gestionnaire de presse-papiers intelligent avec données locales et assistance IA.</desc>

<defs>
