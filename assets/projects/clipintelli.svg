<svg width="1600" height="300" viewBox="0 0 1600 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClipIntelli brutalist backend card</title>
  <desc id="desc">Public project card for ClipIntelli in black white and green</desc>
  <defs><style>.mono{font-family:JetBrains Mono,Consolas,monospace}.sans{font-family:Inter,Segoe UI,Arial,sans-serif}</style></defs>
  <rect width="1600" height="300" fill="#F2F0E7"/>
  <rect x="24" y="24" width="1552" height="252" fill="none" stroke="#111111" stroke-width="4"/>
  <rect x="54" y="54" width="410" height="192" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
