    <text x="22" y="104" fill="#111111" class="sans" font-size="28" font-weight="1000">Générateur de PRD</text>
    <text x="22" y="142" fill="#111111" class="sans" font-size="18" font-weight="700">Transformer une idée en cahier de charges clair.</text>
    <text x="22" y="186" fill="#111111" class="mono" font-size="16" font-weight="900">Next.js + Supabase + IA</text>
