  <rect x="58" y="744" width="1484" height="70" fill="#111111"/>
  <text x="84" y="788" fill="#9BFF00" class="mono" font-size="19" font-weight="900">PAS DE NOMS CLIENTS // PAS DE LIENS PRIVES // PAS DE CODE SOURCE // JUSTE LE SAVOIR-FAIRE</text>
  <text x="1466" y="856" fill="#111111" class="mono" font-size="16" font-weight="900" transform="rotate(180 1466 856)">CONFIDENTIEL</text>
