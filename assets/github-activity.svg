<path d="M78 276 C136 218 160 236 208 178 S288 154 326 198 S390 254 438 180 S526 118 590 166 S682 226 732 148 S824 94 902 132 S1000 210 1102 88" stroke="#58a6ff" stroke-width="4" fill="none" stroke-linecap="round"/>
