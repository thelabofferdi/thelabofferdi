    <circle cx="975" cy="81" r="10" fill="#3776AB" opacity="0.95"/>
    <text x="975" y="83.72" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="12" font-weight="900" text-anchor="middle" fill="#e6edf3" opacity="1">Py</text>
  </g>
<g opacity="1">
    <rect x="1006" y="64" width="34" height="34" rx="10" fill="#2496ED22" stroke="#2496ED" stroke-width="1.4"/>
    <circle cx="1023" cy="81" r="10" fill="#2496ED" opacity="0.95"/>
    <text x="1023" y="83.72" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="12" font-weight="900" text-anchor="middle" fill="#e6edf3" opacity="1">DK</text>
