<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Backend identity card</title>
  <desc id="desc">Terminal card describing Ferdi as a backend-first developer</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080D19"/>
      <stop offset="1" stop-color="#151C2E"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="520" rx="30" fill="url(#bg)"/>
  <rect x="48" y="48" width="1504" height="424" rx="24" fill="#0B1222" stroke="#33415F"/>
  <rect x="48" y="48" width="1504" height="54" rx="24" fill="#101828"/>
  <circle cx="86" cy="75" r="8" fill="#FF6B6B"/>
  <circle cx="116" cy="75" r="8" fill="#FFB86B"/>
  <circle cx="146" cy="75" r="8" fill="#68D8EF"/>
  <text x="184" y="83" fill="#8EA4C8" font-family="JetBrains Mono, Consolas, monospace" font-size="18">backend/identity.yaml</text>

  <g transform="translate(88 140)">
    <text x="0" y="0" fill="#FFB86B" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="800">role:</text>
    <text x="112" y="0" fill="#F5F7FB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="900">Backend-first developer</text>
    <text x="0" y="58" fill="#FFB86B" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="800">scope:</text>
    <text x="112" y="58" fill="#C8D3E7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27">APIs, auth, jobs, databases, automation, realtime services.</text>
    <text x="0" y="116" fill="#FFB86B" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="800">stack:</text>
    <text x="112" y="116" fill="#DDE6F7" font-family="JetBrains Mono, Consolas, monospace" font-size="23">FastAPI | Fastify | Express | Rust/Axum | Go workers | Docker</text>
    <text x="0" y="174" fill="#FFB86B" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="800">data:</text>
    <text x="112" y="174" fill="#DDE6F7" font-family="JetBrains Mono, Consolas, monospace" font-size="23">Postgres | SQLite | Redis | Supabase | Alembic | Prisma</text>
    <text x="0" y="232" fill="#FFB86B" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="800">bias:</text>
    <text x="112" y="232" fill="#C8D3E7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27">Clean contracts first, UI second, production constraints always.</text>
  </g>

  <g transform="translate(1204 150)">
    <rect x="0" y="0" width="236" height="236" rx="28" fill="#101828" stroke="#FFB86B" stroke-opacity="0.38"/>
    <path d="M55 69H181M55 118H181M55 167H181" stroke="#68D8EF" stroke-width="9" stroke-linecap="round"/>
    <circle cx="55" cy="69" r="14" fill="#FFB86B"/>
    <circle cx="55" cy="118" r="14" fill="#A78BFA"/>
    <circle cx="55" cy="167" r="14" fill="#68D8EF"/>
    <text x="54" y="216" fill="#FFB86B" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800">@thelabofferdi</text>
  </g>
</svg>
