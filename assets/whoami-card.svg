<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Backend identity brutalist card</title>
  <desc id="desc">Whoami card using black white and signal green technical layout</desc>
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#111111" fill-opacity="0.12"/>
    </pattern>
    <style>.mono{font-family:JetBrains Mono,Consolas,monospace}.sans{font-family:Inter,Segoe UI,Arial,sans-serif}</style>
  </defs>
  <rect width="1600" height="520" fill="#F2F0E7"/>
  <rect x="24" y="24" width="1552" height="472" fill="none" stroke="#111111" stroke-width="4"/>
  <rect x="48" y="48" width="1504" height="70" fill="#111111"/>
  <circle cx="88" cy="83" r="9" fill="#9BFF00"/>
  <circle cx="122" cy="83" r="9" fill="#F2F0E7"/>
  <circle cx="156" cy="83" r="9" fill="#F2F0E7"/>
  <text x="198" y="91" fill="#F2F0E7" class="mono" font-size="20" font-weight="900">/profile/backend-identity.yaml</text>
  <text x="1296" y="91" fill="#9BFF00" class="mono" font-size="20" font-weight="900">ACCESS: PUBLIC</text>

  <g transform="translate(76 158)">
    <text x="0" y="0" fill="#111111" class="mono" font-size="22" font-weight="900">role:</text>
    <text x="128" y="0" fill="#111111" class="sans" font-size="42" font-weight="1000">Backend-first developer</text>
    <rect x="128" y="14" width="520" height="6" fill="#9BFF00"/>
    <text x="0" y="72" fill="#111111" class="mono" font-size="22" font-weight="900">scope:</text>
    <text x="128" y="72" fill="#111111" class="sans" font-size="27" font-weight="700">APIs, auth, jobs, databases, realtime services and automation.</text>
    <text x="0" y="136" fill="#111111" class="mono" font-size="22" font-weight="900">stack:</text>
    <text x="128" y="136" fill="#111111" class="mono" font-size="23" font-weight="800">FastAPI | NestJS | Express | Rust | Go | Docker</text>
    <text x="0" y="200" fill="#111111" class="mono" font-size="22" font-weight="900">data:</text>
    <text x="128" y="200" fill="#111111" class="mono" font-size="23" font-weight="800">Postgres | SQLite | Redis | Supabase | S3 | MQTT</text>
    <text x="0" y="264" fill="#111111" class="mono" font-size="22" font-weight="900">rule:</text>
    <text x="128" y="264" fill="#111111" class="sans" font-size="27" font-weight="700">Contracts first. Observability always. UI after the core is solid.</text>
  </g>

  <g transform="translate(1190 150)">
    <rect width="280" height="280" fill="#111111"/>
    <rect x="18" y="18" width="244" height="244" fill="#F2F0E7"/>
    <rect x="42" y="46" width="156" height="34" fill="#9BFF00" stroke="#111111" stroke-width="3"/>
    <text x="62" y="69" fill="#111111" class="mono" font-size="15" font-weight="900">ROUTES</text>
    <rect x="42" y="104" width="190" height="34" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
    <text x="62" y="127" fill="#111111" class="mono" font-size="15" font-weight="900">SERVICES</text>
    <rect x="42" y="162" width="122" height="34" fill="#111111" stroke="#111111" stroke-width="3"/>
    <text x="62" y="185" fill="#9BFF00" class="mono" font-size="15" font-weight="900">DATA</text>
    <path d="M198 63H226V179H164" stroke="#111111" stroke-width="4"/>
    <text x="46" y="232" fill="#111111" class="mono" font-size="18" font-weight="900">@thelabofferdi</text>
  </g>
  <rect x="930" y="388" width="198" height="58" fill="url(#dots)" stroke="#111111" stroke-width="3"/>
  <text x="958" y="424" fill="#111111" class="mono" font-size="17" font-weight="900">NO SECRETS</text>
</svg>
