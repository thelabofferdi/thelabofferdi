<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Whoami backend profile</title>
<desc id="desc">Carte identité backend pour Ferdi.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#010409"/><stop offset="0.55" stop-color="#07111d"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 120) rotate(70) scale(360 520)">
    <stop stop-color="#1f6feb" stop-opacity="0.46"/><stop offset="0.55" stop-color="#bc8cff" stop-opacity="0.16"/><stop offset="1" stop-color="#010409" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 360) rotate(40) scale(260 360)">
    <stop stop-color="#3fb950" stop-opacity="0.22"/><stop offset="1" stop-color="#010409" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M36 0H0V36" stroke="#30363d" stroke-opacity="0.38" stroke-width="1"/>
  </pattern>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.44"/>
  </filter>
  <style>
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
  .text{fill:#e6edf3} .soft{fill:#c9d1d9} .muted{fill:#8b949e}
  .blue{fill:#58a6ff} .green{fill:#3fb950} .purple{fill:#bc8cff} .orange{fill:#d29922} .red{fill:#f85149}
  .panel{fill:#0d1117;stroke:#30363d;stroke-width:1.6}
  .panel2{fill:#161b22;stroke:#30363d;stroke-width:1.4}
</style>

</defs>
<rect width="1200" height="520" rx="12" fill="url(#bg)"/>
<rect width="1200" height="520" rx="12" fill="url(#grid)" opacity="0.42"/>
<rect width="1200" height="520" rx="12" fill="url(#glowBlue)"/>
<rect width="1200" height="520" rx="12" fill="url(#glowGreen)"/>

<rect x="24" y="24" width="1152" height="472" rx="26" class="panel" filter="url(#shadow)"/>
<rect x="48" y="48" width="1104" height="58" rx="14" fill="#010409" stroke="#30363d"/>
<circle cx="78" cy="77" r="7" fill="#f85149"/><circle cx="102" cy="77" r="7" fill="#d29922"/><circle cx="126" cy="77" r="7" fill="#3fb950"/>
<text x="166" y="84" class="mono muted" font-size="18" font-weight="800" text-anchor="start" opacity="1">/profil/whoami.yaml</text>
<text x="980" y="84" class="mono green" font-size="17" font-weight="900" text-anchor="start" opacity="1">LANG: FR</text>
<text x="74" y="156" class="mono blue" font-size="21" font-weight="900" text-anchor="start" opacity="1">role:</text><text x="220" y="156" class="sans text" font-size="30" font-weight="900" text-anchor="start" opacity="1">Développeur backend orienté produit</text>
<text x="74" y="216" class="mono blue" font-size="21" font-weight="900" text-anchor="start" opacity="1">mission:</text><text x="220" y="216" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">Créer des APIs, gérer les données, sécuriser</text>
<text x="220" y="244" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">les accès et automatiser.</text>
<text x="74" y="292" class="mono blue" font-size="21" font-weight="900" text-anchor="start" opacity="1">terrain:</text><text x="220" y="292" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">Backends web, mobile, desktop local, realtime</text>
<text x="220" y="320" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">et workers.</text>
<text x="74" y="360" class="mono blue" font-size="21" font-weight="900" text-anchor="start" opacity="1">langages:</text><text x="220" y="360" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">Python, TypeScript, JavaScript, Rust, Go</text>
<text x="74" y="424" class="mono blue" font-size="21" font-weight="900" text-anchor="start" opacity="1">approche:</text><text x="220" y="424" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">Simple à comprendre, robuste à livrer, propre</text>
<text x="220" y="452" class="sans soft" font-size="22" font-weight="700" text-anchor="start" opacity="1">à maintenir.</text>
<g transform="translate(856 166)">
  <rect x="0" y="0" width="238" height="238" rx="20" class="panel2"/>
  <rect x="28" y="34" width="142" height="40" rx="8" fill="#58a6ff22" stroke="#58a6ff"/>
  <text x="52" y="60" class="mono blue" font-size="16" font-weight="900" text-anchor="start" opacity="1">ROUTES</text>
  <rect x="28" y="98" width="178" height="40" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="52" y="124" class="mono soft" font-size="16" font-weight="900" text-anchor="start" opacity="1">SERVICES</text>
  <rect x="28" y="162" width="116" height="40" rx="8" fill="#3fb95022" stroke="#3fb950"/>
  <text x="52" y="188" class="mono green" font-size="16" font-weight="900" text-anchor="start" opacity="1">DATA</text>
  <path d="M170 54h34v128h-60" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"/>
</g>
<rect x="840" y="430" width="286" height="30" rx="15" fill="#bc8cff22" stroke="#bc8cff" stroke-opacity="0.76"/>
<text x="854" y="450" class="mono text" font-size="14" font-weight="800" text-anchor="start" opacity="1">private client code respected</text>
</svg>