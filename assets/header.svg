<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TheLaboFerdi Backend Lab header</title>
  <desc id="desc">Dark GitHub inspired profile header for Ferdi backend lab.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#010409"/>
      <stop offset="0.55" stop-color="#07111d"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 190) rotate(75) scale(360 520)">
      <stop stop-color="#1f6feb" stop-opacity="0.46"/>
      <stop offset="0.48" stop-color="#6e40c9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#010409" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#30363d" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
      .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
      .text{fill:#e6edf3}.soft{fill:#c9d1d9}.muted{fill:#8b949e}.blue{fill:#58a6ff}.green{fill:#3fb950}.orange{fill:#d29922}.purple{fill:#bc8cff}
      .card{fill:#0d1117;stroke:#30363d;stroke-width:1.6}.inner{fill:#161b22;stroke:#30363d;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#grid)" opacity="0.35"/>
  <rect width="1600" height="520" fill="url(#glow)"/>

  <g class="sans" filter="url(#shadow)">
    <rect x="36" y="38" width="1528" height="444" rx="12" class="card"/>
    <rect x="36" y="38" width="1528" height="62" rx="12" fill="#010409"/>
    <path d="M36 100H1564" stroke="#30363d"/>
    <circle cx="72" cy="69" r="8" fill="#f85149"/>
    <circle cx="100" cy="69" r="8" fill="#d29922"/>
    <circle cx="128" cy="69" r="8" fill="#3fb950"/>
    <text x="164" y="77" class="mono muted" font-size="18" font-weight="700">thelabofferdi / backend-lab</text>
    <rect x="1314" y="56" width="110" height="28" rx="14" fill="#10261a" stroke="#238636"/>
    <circle cx="1340" cy="70" r="5" fill="#3fb950"/>
    <text x="1354" y="76" class="mono green" font-size="13" font-weight="800">available</text>
    <rect x="1440" y="56" width="92" height="28" rx="14" fill="#0b1d2e" stroke="#1f6feb"/>
    <text x="1461" y="76" class="mono blue" font-size="13" font-weight="800">remote</text>

    <g transform="translate(74 148)">
      <text x="0" y="0" class="mono blue" font-size="22" font-weight="900">THELABOFERDI</text>
      <text x="0" y="84" class="text" font-size="76" font-weight="900">Backend Lab</text>
      <text x="0" y="132" class="soft" font-size="27" font-weight="600">APIs solides, auth propre, données fiables</text>
      <text x="0" y="168" class="soft" font-size="27" font-weight="600">et workers qui tiennent en production.</text>
      <text x="0" y="206" class="muted" font-size="20">La partie invisible qui rend un produit rapide, sûr et maintenable.</text>

      <g transform="translate(0 248)">
        <rect x="0" y="0" width="152" height="42" rx="7" fill="#1f6feb" stroke="#58a6ff"/>
        <text x="72" y="27" class="text" font-size="15" font-weight="800">Repos</text>
        <path d="M24 14l10 7l-10 7M38 21h22" stroke="#e6edf3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="168" y="0" width="156" height="42" rx="7" class="inner"/>
        <text x="232" y="27" class="soft" font-size="15" font-weight="800">Contact</text>
        <path d="M192 14h26v18h-26zM192 14l13 11l13-11" stroke="#8b949e" stroke-width="1.8" fill="none"/>
      </g>
    </g>

    <g transform="translate(840 132)">
      <rect x="0" y="0" width="640" height="286" rx="12" class="inner"/>
      <path d="M0 54H640" stroke="#30363d"/>
      <text x="28" y="35" class="mono muted" font-size="15" font-weight="700">system/backend-overview.yml</text>
      <text x="548" y="35" class="mono green" font-size="15" font-weight="800">healthy</text>
      <g transform="translate(42 92)">
        <rect x="0" y="0" width="128" height="72" rx="8" fill="#0b1d2e" stroke="#1f6feb"/>
        <text x="28" y="43" class="mono blue" font-size="18" font-weight="900">API</text>
        <rect x="212" y="0" width="128" height="72" rx="8" fill="#10261a" stroke="#238636"/>
        <text x="240" y="43" class="mono green" font-size="18" font-weight="900">AUTH</text>
        <rect x="424" y="0" width="128" height="72" rx="8" fill="#2b2111" stroke="#9e6a03"/>
        <text x="464" y="43" class="mono orange" font-size="18" font-weight="900">DB</text>
        <path d="M128 36H212M340 36H424" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
        <path d="M170 36v74H64" stroke="#30363d" stroke-width="3" stroke-linecap="round"/>
        <rect x="0" y="130" width="128" height="72" rx="8" fill="#1c1230" stroke="#8957e5"/>
        <text x="21" y="173" class="mono purple" font-size="18" font-weight="900">WORKER</text>
        <path d="M488 72v58H128" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
        <rect x="212" y="130" width="128" height="72" rx="8" fill="#0d1117" stroke="#30363d"/>
        <text x="245" y="173" class="mono soft" font-size="18" font-weight="900">LOGS</text>
        <rect x="424" y="130" width="128" height="72" rx="8" fill="#0d1117" stroke="#30363d"/>
        <text x="454" y="173" class="mono soft" font-size="18" font-weight="900">SHIP</text>
      </g>
    </g>
  </g>
</svg>
