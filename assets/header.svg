<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" fill="none" role="img" aria-labelledby="title desc">
<title id="title">TheLaboFerdi Backend Lab</title>
<desc id="desc">Header GitHub du profil backend TheLaboFerdi.</desc>

<defs>
