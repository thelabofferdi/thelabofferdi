<svg width="1600" height="460" viewBox="0 0 1600 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ferdi Backend Lab brutalist header</title>
  <desc id="desc">Black white and signal green backend profile header inspired by industrial technical posters</desc>
  <defs>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#111111" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <path d="M0 0V10" stroke="#111111" stroke-opacity="0.18" stroke-width="2"/>
    </pattern>
    <style>
      .mono{font-family:JetBrains Mono,Consolas,monospace}.sans{font-family:Inter,Segoe UI,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1600" height="460" rx="0" fill="#F2F0E7"/>
  <rect width="1600" height="460" fill="url(#grid)"/>
  <rect x="22" y="22" width="1556" height="416" fill="none" stroke="#111111" stroke-width="4"/>
  <rect x="44" y="42" width="1512" height="58" fill="#111111"/>
  <text x="70" y="80" fill="#F2F0E7" class="mono" font-size="20" font-weight="900">BACKEND-FIRST // SYSTEMS // API // DATA // WORKERS</text>
  <text x="1328" y="80" fill="#9BFF00" class="mono" font-size="20" font-weight="900">STATUS: ONLINE</text>

  <g transform="translate(70 136)">
    <text x="0" y="0" fill="#111111" class="mono" font-size="20" font-weight="900" letter-spacing="4">THELABOFFERDI</text>
    <text x="0" y="86" fill="#111111" class="sans" font-size="92" font-weight="1000" letter-spacing="-5">BACKEND LAB</text>
    <rect x="0" y="111" width="920" height="5" fill="#111111"/>
    <text x="0" y="154" fill="#111111" class="sans" font-size="31" font-weight="700">APIs, service cores, mobile backends and automation engines.</text>
    <g transform="translate(0 191)">
      <rect x="0" y="0" width="178" height="46" fill="#9BFF00" stroke="#111111" stroke-width="3"/>
      <text x="21" y="30" fill="#111111" class="mono" font-size="16" font-weight="900">FASTAPI</text>
      <rect x="196" y="0" width="178" height="46" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
      <text x="217" y="30" fill="#111111" class="mono" font-size="16" font-weight="900">NESTJS</text>
      <rect x="392" y="0" width="188" height="46" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
      <text x="414" y="30" fill="#111111" class="mono" font-size="16" font-weight="900">POSTGRES</text>
      <rect x="598" y="0" width="164" height="46" fill="#111111" stroke="#111111" stroke-width="3"/>
      <text x="621" y="30" fill="#9BFF00" class="mono" font-size="16" font-weight="900">DOCKER</text>
    </g>
  </g>

  <g transform="translate(1080 125) rotate(-8)">
    <rect x="0" y="0" width="380" height="234" fill="#111111"/>
    <rect x="18" y="18" width="344" height="198" fill="#F2F0E7"/>
    <rect x="42" y="42" width="132" height="42" fill="#9BFF00" stroke="#111111" stroke-width="3"/>
    <text x="62" y="70" fill="#111111" class="mono" font-size="15" font-weight="900">API GW</text>
    <rect x="214" y="42" width="102" height="42" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
    <text x="237" y="70" fill="#111111" class="mono" font-size="15" font-weight="900">AUTH</text>
    <rect x="72" y="126" width="112" height="42" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
    <text x="99" y="154" fill="#111111" class="mono" font-size="15" font-weight="900">JOB</text>
    <rect x="226" y="126" width="82" height="42" fill="#111111" stroke="#111111" stroke-width="3"/>
    <text x="248" y="154" fill="#9BFF00" class="mono" font-size="15" font-weight="900">DB</text>
    <path d="M174 63H214M265 84V126M174 84L128 126M184 147H226" stroke="#111111" stroke-width="4"/>
  </g>

  <rect x="1172" y="344" width="330" height="44" fill="url(#hatch)" stroke="#111111" stroke-width="3"/>
  <text x="1201" y="374" fill="#111111" class="mono" font-size="18" font-weight="900">BUILD FAST / KEEP CLEAN</text>
  <text x="1522" y="430" fill="#111111" class="mono" font-size="16" font-weight="900" transform="rotate(180 1522 430)">LAB-2026</text>
</svg>
