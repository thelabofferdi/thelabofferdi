<svg width="1600" height="180" viewBox="0 0 1600 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Backend lab footer</title>
  <desc id="desc">Dark footer for TheLaboFerdi backend profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#010409"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
      .text{fill:#e6edf3}.muted{fill:#8b949e}.blue{fill:#58a6ff}.green{fill:#3fb950}
    </style>
  </defs>
  <rect width="1600" height="180" rx="10" fill="url(#bg)"/>
  <rect x="22" y="22" width="1556" height="136" rx="10" fill="#0d1117" stroke="#30363d"/>
  <g class="sans">
    <text x="58" y="78" class="text" font-size="30" font-weight="850">Des backends fiables pour de vrais produits.</text>
    <text x="58" y="116" class="muted" font-size="18">construire() · livrer() · maintenir() · mesurer()</text>
    <rect x="1180" y="58" width="300" height="54" rx="8" fill="#0b1d2e" stroke="#1f6feb"/>
    <text x="1230" y="92" class="mono blue" font-size="17" font-weight="850">github.com/thelabofferdi</text>
    <circle cx="1126" cy="86" r="14" fill="#3fb950"/>
    <path d="M1118 86l6 6l12-16" stroke="#0d1117" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
