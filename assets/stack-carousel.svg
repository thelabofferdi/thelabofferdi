<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" fill="none" role="img" aria-labelledby="title desc">
<title id="title">Stack backend carousel</title>
<desc id="desc">Carousel statique de stack backend.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#010409"/><stop offset="0.55" stop-color="#07111d"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 120) rotate(70) scale(360 520)">
    <stop stop-color="#1f6feb" stop-opacity="0.46"/><stop offset="0.55" stop-color="#bc8cff" stop-opacity="0.16"/><stop offset="1" stop-color="#010409" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 360) rotate(40) scale(260 360)">
    <stop stop-color="#3fb950" stop-opacity="0.22"/><stop offset="1" stop-color="#010409" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M36 0H0V36" stroke="#30363d" stroke-opacity="0.38" stroke-width="1"/>
  </pattern>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.44"/>
  </filter>
  <style>
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
  .text{fill:#e6edf3} .soft{fill:#c9d1d9} .muted{fill:#8b949e}
  .blue{fill:#58a6ff} .green{fill:#3fb950} .purple{fill:#bc8cff} .orange{fill:#d29922} .red{fill:#f85149}
  .panel{fill:#0d1117;stroke:#30363d;stroke-width:1.6}
  .panel2{fill:#161b22;stroke:#30363d;stroke-width:1.4}
</style>

</defs>
<rect width="1200" height="560" rx="12" fill="url(#bg)"/>
<rect width="1200" height="560" rx="12" fill="url(#grid)" opacity="0.42"/>
<rect width="1200" height="560" rx="12" fill="url(#glowBlue)"/>
<rect width="1200" height="560" rx="12" fill="url(#glowGreen)"/>

<rect x="24" y="24" width="1152" height="512" rx="26" class="panel" filter="url(#shadow)"/>
<text x="58" y="82" class="sans text" font-size="42" font-weight="900" text-anchor="start" opacity="1">Stack Backend</text>
<text x="58" y="118" class="sans muted" font-size="19" font-weight="500" text-anchor="start" opacity="1">Un carousel statique façon profil premium: chaque bloc explique une capacité backend.</text>
<rect x="900" y="62" width="240" height="30" rx="15" fill="#3fb95022" stroke="#3fb950" stroke-opacity="0.76"/>
<text x="914" y="82" class="mono text" font-size="14" font-weight="800" text-anchor="start" opacity="1">utility before buzzword</text>
<g transform="translate(54 154)">
      <rect x="0" y="0" width="246" height="270" rx="18" class="panel2"/>
      <rect x="0" y="0" width="246" height="50" rx="18" fill="#58a6ff22" stroke="#58a6ff"/>
      <text x="22" y="32" class="mono text" font-size="16" font-weight="900" text-anchor="start" opacity="1">CRÉER API</text>
      <text x="24" y="100" class="sans text" font-size="27" font-weight="900" text-anchor="start" opacity="1">FastAPI</text>
      <text x="24" y="148" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">NestJS</text>
      <text x="24" y="196" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">Express</text>
      <rect x="24" y="224" width="150" height="8" rx="4" fill="#58a6ff"/>
    </g>
<g transform="translate(334 154)">
      <rect x="0" y="0" width="246" height="270" rx="18" class="panel2"/>
      <rect x="0" y="0" width="246" height="50" rx="18" fill="#3fb95022" stroke="#3fb950"/>
      <text x="22" y="32" class="mono text" font-size="16" font-weight="900" text-anchor="start" opacity="1">STOCKER</text>
      <text x="24" y="100" class="sans text" font-size="27" font-weight="900" text-anchor="start" opacity="1">PostgreSQL</text>
      <text x="24" y="148" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">SQLite</text>
      <text x="24" y="196" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">Redis</text>
      <rect x="24" y="224" width="150" height="8" rx="4" fill="#3fb950"/>
    </g>
<g transform="translate(614 154)">
      <rect x="0" y="0" width="246" height="270" rx="18" class="panel2"/>
      <rect x="0" y="0" width="246" height="50" rx="18" fill="#bc8cff22" stroke="#bc8cff"/>
      <text x="22" y="32" class="mono text" font-size="16" font-weight="900" text-anchor="start" opacity="1">FAIRE TOURNER</text>
      <text x="24" y="100" class="sans text" font-size="27" font-weight="900" text-anchor="start" opacity="1">Workers</text>
      <text x="24" y="148" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">WebSocket</text>
      <text x="24" y="196" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">MQTT</text>
      <rect x="24" y="224" width="150" height="8" rx="4" fill="#bc8cff"/>
    </g>
<g transform="translate(894 154)">
      <rect x="0" y="0" width="246" height="270" rx="18" class="panel2"/>
      <rect x="0" y="0" width="246" height="50" rx="18" fill="#d2992222" stroke="#d29922"/>
      <text x="22" y="32" class="mono text" font-size="16" font-weight="900" text-anchor="start" opacity="1">LIVRER</text>
      <text x="24" y="100" class="sans text" font-size="27" font-weight="900" text-anchor="start" opacity="1">Docker</text>
      <text x="24" y="148" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">CI/CD</text>
      <text x="24" y="196" class="sans soft" font-size="27" font-weight="850" text-anchor="start" opacity="1">Monitoring</text>
      <rect x="24" y="224" width="150" height="8" rx="4" fill="#d29922"/>
    </g>
<rect x="58" y="462" width="1084" height="42" rx="10" fill="#010409" stroke="#30363d"/>
<text x="84" y="489" class="mono blue" font-size="17" font-weight="800" text-anchor="start" opacity="1">idée -&gt; API -&gt; auth -&gt; données -&gt; workers -&gt; mobile/web -&gt; livraison</text>
</svg>