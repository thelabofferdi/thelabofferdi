<svg width="1600" height="580" viewBox="0 0 1600 580" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Backend stack brutalist map</title>
  <desc id="desc">Backend stack map in black white and signal green</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#111111" stroke-opacity="0.08"/>
    </pattern>
    <style>.mono{font-family:JetBrains Mono,Consolas,monospace}.sans{font-family:Inter,Segoe UI,Arial,sans-serif}</style>
  </defs>
  <rect width="1600" height="580" fill="#F2F0E7"/>
  <rect width="1600" height="580" fill="url(#grid)"/>
  <rect x="24" y="24" width="1552" height="532" fill="none" stroke="#111111" stroke-width="4"/>
  <rect x="58" y="54" width="1484" height="62" fill="#111111"/>
  <text x="84" y="94" fill="#F2F0E7" class="sans" font-size="38" font-weight="1000">BACKEND STACK MAP</text>
  <text x="1202" y="94" fill="#9BFF00" class="mono" font-size="18" font-weight="900">CONTRACT / DATA / OPS</text>

  <g transform="translate(58 150)">
    <rect width="330" height="290" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
    <rect x="0" y="0" width="330" height="48" fill="#9BFF00" stroke="#111111" stroke-width="3"/>
    <text x="24" y="31" fill="#111111" class="mono" font-size="18" font-weight="900">API RUNTIMES</text>
    <text x="26" y="94" fill="#111111" class="sans" font-size="28" font-weight="900">FastAPI</text>
    <text x="26" y="140" fill="#111111" class="sans" font-size="28" font-weight="900">NestJS</text>
    <text x="26" y="186" fill="#111111" class="sans" font-size="28" font-weight="900">Express</text>
    <text x="26" y="232" fill="#111111" class="sans" font-size="28" font-weight="900">Axum</text>
  </g>

  <g transform="translate(432 150)">
    <rect width="330" height="290" fill="#111111" stroke="#111111" stroke-width="3"/>
    <rect x="18" y="18" width="294" height="254" fill="#F2F0E7"/>
    <text x="42" y="66" fill="#111111" class="mono" font-size="18" font-weight="900">DATA LAYERS</text>
    <rect x="42" y="88" width="182" height="5" fill="#9BFF00"/>
    <text x="42" y="128" fill="#111111" class="sans" font-size="27" font-weight="900">PostgreSQL</text>
    <text x="42" y="172" fill="#111111" class="sans" font-size="27" font-weight="900">SQLite</text>
    <text x="42" y="216" fill="#111111" class="sans" font-size="27" font-weight="900">Redis / Supabase</text>
  </g>

  <g transform="translate(806 150)">
    <rect width="330" height="290" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
    <text x="24" y="47" fill="#111111" class="mono" font-size="18" font-weight="900">ENGINES</text>
    <path d="M24 66H306" stroke="#111111" stroke-width="3"/>
    <text x="24" y="114" fill="#111111" class="sans" font-size="27" font-weight="900">Rust / Tokio</text>
    <text x="24" y="158" fill="#111111" class="sans" font-size="27" font-weight="900">Go workers</text>
    <text x="24" y="202" fill="#111111" class="sans" font-size="27" font-weight="900">MQTT / WebSocket</text>
    <rect x="24" y="228" width="180" height="38" fill="#9BFF00" stroke="#111111" stroke-width="3"/>
    <text x="46" y="253" fill="#111111" class="mono" font-size="15" font-weight="900">AUTOMATION</text>
  </g>

  <g transform="translate(1180 150)">
    <rect width="330" height="290" fill="#F2F0E7" stroke="#111111" stroke-width="3"/>
    <rect x="0" y="0" width="330" height="48" fill="#111111"/>
    <text x="24" y="31" fill="#9BFF00" class="mono" font-size="18" font-weight="900">OPS</text>
    <text x="24" y="94" fill="#111111" class="sans" font-size="27" font-weight="900">Docker</text>
    <text x="24" y="138" fill="#111111" class="sans" font-size="27" font-weight="900">CI/CD</text>
    <text x="24" y="182" fill="#111111" class="sans" font-size="27" font-weight="900">Prometheus</text>
    <text x="24" y="226" fill="#111111" class="sans" font-size="27" font-weight="900">PM2 / Cloud</text>
  </g>

  <rect x="58" y="480" width="1484" height="48" fill="#111111"/>
  <text x="84" y="511" fill="#9BFF00" class="mono" font-size="18" font-weight="900">request -> validation -> auth -> persistence -> worker -> metrics -> deploy</text>
</svg>
