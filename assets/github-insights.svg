<text x="176" y="342" class="mono text" font-size="14" font-weight="800" text-anchor="start" opacity="1">workers</text><rect x="286" y="322" width="78" height="30" rx="15" fill="#3fb95022" stroke="#3fb950" stroke-opacity="0.76"/>
<text x="300" y="342" class="mono text" font-size="14" font-weight="800" text-anchor="start" opacity="1">auth</text><rect x="380" y="322" width="78" height="30" rx="15" fill="#d2992222" stroke="#d29922" stroke-opacity="0.76"/>
<text x="394" y="342" class="mono text" font-size="14" font-weight="800" text-anchor="start" opacity="1">data</text><rect x="474" y="322" width="118" height="30" rx="15" fill="#58a6ff22" stroke="#58a6ff" stroke-opacity="0.76"/>
<text x="488" y="342" class="mono text" font-size="14" font-weight="800" text-anchor="start" opacity="1">delivery</text>
</svg>