<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none" role="img" aria-labelledby="title desc">
<title id="title">GitHub insights</title>
<desc id="desc">Insights de langages et axes backend.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#010409"/><stop offset="0.55" stop-color="#07111d"/><stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 120) rotate(70) scale(360 520)">
    <stop stop-color="#1f6feb" stop-opacity="0.46"/><stop offset="0.55" stop-color="#bc8cff" stop-opacity="0.16"/><stop offset="1" stop-color="#010409" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 360) rotate(40) scale(260 360)">
    <stop stop-color="#3fb950" stop-opacity="0.22"/><stop offset="1" stop-color="#010409" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M36 0H0V36" stroke="#30363d" stroke-opacity="0.38" stroke-width="1"/>
  </pattern>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.44"/>
  </filter>
  <style>
  .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
  .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
  .text{fill:#e6edf3} .soft{fill:#c9d1d9} .muted{fill:#8b949e}
  .blue{fill:#58a6ff} .green{fill:#3fb950} .purple{fill:#bc8cff} .orange{fill:#d29922} .red{fill:#f85149}
  .panel{fill:#0d1117;stroke:#30363d;stroke-width:1.6}
  .panel2{fill:#161b22;stroke:#30363d;stroke-width:1.4}
</style>

</defs>
<rect width="1200" height="420" rx="12" fill="url(#bg)"/>
<rect width="1200" height="420" rx="12" fill="url(#grid)" opacity="0.42"/>
<rect width="1200" height="420" rx="12" fill="url(#glowBlue)"/>
<rect width="1200" height="420" rx="12" fill="url(#glowGreen)"/>

<rect x="24" y="24" width="1152" height="368" rx="26" class="panel" filter="url(#shadow)"/>
<text x="58" y="82" class="sans text" font-size="40" font-weight="900" text-anchor="start" opacity="1">GitHub Insights</text>
<text x="72" y="126" class="sans soft" font-size="18" font-weight="800" text-anchor="start" opacity="1">TypeScript</text><rect x="286" y="111" width="650" height="12" rx="6" fill="#30363d"/><rect x="286" y="111" width="273" height="12" rx="6" fill="#58a6ff"/><text x="970" y="126" class="mono muted" font-size="18" font-weight="800" text-anchor="start" opacity="1">42%</text>
<text x="72" y="172" class="sans soft" font-size="18" font-weight="800" text-anchor="start" opacity="1">Python</text><rect x="286" y="157" width="650" height="12" rx="6" fill="#30363d"/><rect x="286" y="157" width="162.5" height="12" rx="6" fill="#3fb950"/><text x="970" y="172" class="mono muted" font-size="18" font-weight="800" text-anchor="start" opacity="1">25%</text>
<text x="72" y="218" class="sans soft" font-size="18" font-weight="800" text-anchor="start" opacity="1">JavaScript</text><rect x="286" y="203" width="650" height="12" rx="6" fill="#30363d"/><rect x="286" y="203" width="91" height="12" rx="6" fill="#d29922"/><text x="970" y="218" class="mono muted" font-size="18" font-weight="800" text-anchor="start" opacity="1">14%</text>
<text x="72" y="264" class="sans soft" font-size="18" font-weight="800" text-anchor="start" opacity="1">Rust/Go</text><rect x="286" y="249" width="650" height="12" rx="6" fill="#30363d"/><rect x="286" y="249" width="71.5" height="12" rx="6" fill="#bc8cff"/><text x="970" y="264" class="mono muted" font-size="18" font-weight="800" text-anchor="start" opacity="1">11%</text>
<text x="72" y="310" class="sans soft" font-size="18" font-weight="800" text-anchor="start" opacity="1">Other</text><rect x="286" y="295" width="650" height="12" rx="6" fill="#30363d"/><rect x="286" y="295" width="52" height="12" rx="6" fill="#8b949e"/><text x="970" y="310" class="mono muted" font-size="18" font-weight="800" text-anchor="start" opacity="1">8%</text>
